<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#09061f"/>
      <stop offset="100%" stop-color="#02040f"/>
    </radialGradient>

    <radialGradient id="neb1a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6a2fb0" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#4b1d7a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4b1d7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb1b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c04fd8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c04fd8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="neb2a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12839e" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#0b5f7d" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b5f7d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2fd8c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2fd8c8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="neb3a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9c3ce0" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#7b2cbf" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e04fb0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e04fb0" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#02040f"/>
  <rect width="1600" height="900" fill="url(#g1)"/>

  <!-- nebulas: layered, blurred, drifting very slowly -->
  <g filter="url(#softBlur)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 18,-10; 0,0" dur="140s" repeatCount="indefinite"/>
      <ellipse cx="1100" cy="310" rx="300" ry="180" fill="url(#neb1a)"/>
      <ellipse cx="1180" cy="260" rx="180" ry="120" fill="url(#neb1b)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -15,12; 0,0" dur="160s" repeatCount="indefinite"/>
      <ellipse cx="430" cy="650" rx="240" ry="160" fill="url(#neb2a)"/>
      <ellipse cx="500" cy="600" rx="150" ry="100" fill="url(#neb2b)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 12,14; 0,0" dur="180s" repeatCount="indefinite"/>
      <ellipse cx="1200" cy="700" rx="260" ry="170" fill="url(#neb3a)"/>
      <ellipse cx="1280" cy="740" rx="160" ry="110" fill="url(#neb3b)"/>
    </g>
  </g>

  <!-- stars: varied size/opacity, staggered twinkle -->
  <g fill="#fff">
    <circle cx="250" cy="180" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="130" r="1.2"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="220" r="2.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.1s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="110" r="1.2"><animate attributeName="opacity" values="1;0.4;1" dur="3.6s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="1220" cy="180" r="1.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.9s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="1400" cy="260" r="1.2"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.4s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="520" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="680" r="1.4"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="610" r="1.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.3s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="760" r="1.2"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.4s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="1330" cy="640" r="1.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1500" cy="780" r="1.2"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="480" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" begin="1.5s" repeatCount="indefinite"/></circle>

    <!-- extra dim fillers for depth -->
    <circle cx="150" cy="380" r="0.9" opacity="0.4"/>
    <circle cx="520" cy="90" r="0.9" opacity="0.5"/>
    <circle cx="780" cy="350" r="0.9" opacity="0.35"/>
    <circle cx="950" cy="560" r="0.9" opacity="0.45"/>
    <circle cx="1050" cy="850" r="0.9" opacity="0.4"/>
    <circle cx="1380" cy="480" r="0.9" opacity="0.5"/>
    <circle cx="1550" cy="130" r="0.9" opacity="0.35"/>
    <circle cx="60" cy="700" r="0.9" opacity="0.45"/>
    <circle cx="1250" cy="420" r="0.9" opacity="0.4"/>
    <circle cx="380" cy="800" r="0.9" opacity="0.5"/>
  </g>
</svg>